<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Siswa - SekolahDigi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="style-student.css">
    <link rel="stylesheet" href="sidebar-student.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex min-h-screen overflow-hidden relative">

    <div id="login-container" class="absolute inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="bg-blue-600 p-6 text-center">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i data-lucide="book-open" class="text-blue-600" width="32" height="32"></i>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-wide">Portal<span class="text-blue-200">Siswa</span></h1>
                <p class="text-blue-100 text-sm mt-1">Sciedutech Academy</p>
            </div>
            <div class="p-8">
                <form id="studentLoginForm" onsubmit="handleStudentLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Email Siswa</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="18"></i>
                            <input type="email" id="studentEmail" required placeholder="nama@mtsts.sc.id" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Kata Sandi (NISN)</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="18"></i>
                            <input type="password" id="studentPassword" required placeholder="••••••••" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                    </div>
                    <button type="submit" id="btnLogin" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2 flex justify-center items-center gap-2">
                        Masuk Kelas <i data-lucide="arrow-right" width="18"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden w-full h-full flex min-h-screen overflow-hidden">
        <div id="mobile-overlay" class="hidden" onclick="toggleMobileMenu()"></div>

        <aside id="sidebar" class="bg-white border-r border-slate-200 flex flex-col h-screen z-40">
            <div class="p-6 flex items-center justify-between lg:justify-center border-b border-slate-100 lg:border-none shrink-0">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">SC</div>
                    <span class="font-bold text-lg tracking-tight text-slate-800">Sciedutech.id<br><span class="text-blue-600">Sciedutech Academy</span></span>
                </div>
                <button onclick="toggleMobileMenu()" class="lg:hidden text-slate-500">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div id="nav-container" class="mt-6 space-y-2 px-4 flex-1 overflow-y-auto pb-24">
                </div>

            <div class="p-4 border-t border-slate-100 bg-white shrink-0">
                <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition text-sm font-medium">
                    <i data-lucide="log-out" width="18"></i> Keluar Akun
                </button>
            </div>
        </aside>

        <main class="flex-1 min-w-0 flex flex-col h-screen overflow-hidden">
            <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 px-6 py-4 border-b border-slate-200 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleMobileMenu()" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg text-slate-600">
                        <i data-lucide="menu"></i>
                    </button>
                    <h2 id="page-title" class="font-bold text-lg text-slate-800 hidden sm:block">Beranda</h2>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 pl-4 border-slate-200">
                        <div class="text-right hidden md:block">
                            <div class="text-sm font-bold text-slate-800" id="header-name">Siswa</div>
                            <div class="text-xs text-slate-500" id="header-class">Kelas</div>
                        </div>
                        <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=student" alt="Profile" class="w-9 h-9 rounded-full bg-slate-100 border border-slate-200" />
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-auto p-4 md:p-6 lg:p-8 bg-slate-50/50">
                <div id="app-content" class="max-w-7xl mx-auto pb-10"></div>
            </div>
        </main>
    </div>

    <div id="letterModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" onclick="closeLetterModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-xl sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex justify-between items-center mb-5 border-b pb-2">
                        <h3 class="text-lg leading-6 font-bold text-slate-900">Buat Pengajuan Surat / Izin</h3>
                        <button onclick="closeLetterModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
                    </div>
                    <form id="letterForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Jenis Pengajuan</label>
                            <select id="letterType" class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                <option value="Izin Sakit">Izin Sakit (Butuh Istirahat)</option>
                                <option value="Izin Keperluan Keluarga">Izin Keperluan Keluarga</option>
                                <option value="Surat Keterangan Aktif">Permintaan Surat Keterangan Siswa Aktif</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Keterangan / Alasan</label>
                            <textarea id="letterDesc" rows="4" placeholder="Tuliskan keterangan detail di sini..." required class="mt-1 block w-full border border-slate-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
                        </div>
                    </form>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" onclick="submitLetter()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                        Kirim Pengajuan
                    </button>
                    <button type="button" onclick="closeLetterModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="student.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
