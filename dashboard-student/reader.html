<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Book Reader - SekolahDigi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-950 h-screen w-screen flex flex-col overflow-hidden text-white font-sans">
    
    <header class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between shadow-md shrink-0 z-10">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-full transition" title="Kembali">
                <i data-lucide="arrow-left" width="20"></i>
            </button>
            <div class="border-l border-slate-700 pl-4">
                <h1 id="bookTitle" class="font-bold text-base md:text-lg leading-tight line-clamp-1 text-slate-100">Memuat Buku...</h1>
                <p id="bookAuthor" class="text-[10px] md:text-xs text-slate-400">Mohon tunggu</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="hidden md:inline-block px-3 py-1 bg-blue-600/20 text-blue-400 border border-blue-600/30 rounded text-xs font-bold mr-2">E-Book Viewer</span>
            <button onclick="toggleFullscreen()" class="p-2 text-slate-400 hover:text-white transition bg-slate-800 hover:bg-slate-700 rounded-lg" title="Layar Penuh">
                <i data-lucide="maximize" width="20"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 w-full relative bg-slate-800">
        <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-0">
            <i data-lucide="loader-2" class="animate-spin text-blue-500 mb-3" width="40" height="40"></i>
            <p class="text-slate-400 animate-pulse text-sm font-medium">Menyiapkan Halaman Buku...</p>
        </div>
        
        <iframe id="pdfFrame" class="w-full h-full border-none hidden z-10 relative" allowfullscreen></iframe>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWp0bTZLKoE4LMLTAj7uF4hWjrjGF19Tk",
            authDomain: "school-dashboard-trial.firebaseapp.com",
            projectId: "school-dashboard-trial",
            storageBucket: "school-dashboard-trial.firebasestorage.app",
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        lucide.createIcons();

        // KITA TUNGGU FIREBASE MENGECEK LOGIN SISWA DULU
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Jika sudah login, baru kita panggil bukunya!
                loadBook();
            } else {
                // Jika penyusup (belum login)
                alert("Akses Ditolak: Silakan login terlebih dahulu.");
                window.location.href = "student.html"; // Lempar ke halaman login
            }
        });

        async function loadBook() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('bookId');

            if(!bookId) {
                alert("Buku tidak ditemukan!");
                window.history.back();
                return;
            }

            try {
                const doc = await db.collection("books").doc(bookId).get();
                if(!doc.exists) throw new Error("Buku telah dihapus atau tidak tersedia.");

                const book = doc.data();
                
                document.getElementById('bookTitle').innerText = book.title;
                document.getElementById('bookAuthor').innerText = book.author || 'Penulis Anonim';

                let pdfUrl = book.pdfUrl;
                
                if(pdfUrl && pdfUrl.includes('drive.google.com')) {
                    const match = pdfUrl.match(/\/d\/(.*?)\//);
                    if(match && match[1]) {
                        pdfUrl = `https://drive.google.com/file/d/${match[1]}/preview`;
                    }
                }

                const iframe = document.getElementById('pdfFrame');
                iframe.src = pdfUrl;
                
                iframe.onload = () => {
                    document.getElementById('loader').classList.add('hidden');
                    iframe.classList.remove('hidden');
                };

            } catch(e) {
                alert("Error: " + e.message);
                window.history.back();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
