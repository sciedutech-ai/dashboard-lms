<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Terpadu - MTS Tarbiyatus Syarifah</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="login.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300" id="loginCard">
        
        <div class="grid grid-cols-3 bg-slate-50 border-b border-slate-200 p-1">
            <button onclick="switchRole('siswa')" id="btn-siswa" class="role-btn py-3 text-sm font-bold text-slate-500 rounded-t-lg hover:bg-white hover:text-slate-700 transition-all flex flex-col items-center gap-1 active-tab">
                <i data-lucide="graduation-cap" width="18"></i> Siswa
            </button>
            <button onclick="switchRole('guru')" id="btn-guru" class="role-btn py-3 text-sm font-bold text-slate-500 rounded-t-lg hover:bg-white hover:text-slate-700 transition-all flex flex-col items-center gap-1">
                <i data-lucide="book-open" width="18"></i> Guru
            </button>
            <button onclick="switchRole('admin')" id="btn-admin" class="role-btn py-3 text-sm font-bold text-slate-500 rounded-t-lg hover:bg-white hover:text-slate-700 transition-all flex flex-col items-center gap-1">
                <i data-lucide="shield-check" width="18"></i> Admin
            </button>
        </div>

        <div id="header-bg" class="bg-emerald-600 p-8 text-center role-transition">
            <div class="mx-auto w-16 h-16 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center text-white mb-4 shadow-lg">
                <i id="header-icon" data-lucide="graduation-cap" width="32" height="32"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Portal <span id="role-text">Siswa</span></h2>
            <p class="text-white/80 text-sm mt-1">MTS Tarbiyatus Syarifah</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email / Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="mail" width="18"></i>
                        </div>
                        <input type="email" id="email" required 
                            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 transition sm:text-sm" 
                            placeholder="nama@mtsts.sc.id">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="lock" width="18"></i>
                        </div>
                        <input type="password" id="password" required 
                            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 transition sm:text-sm" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-gray-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer select-none">
                            Ingat Saya
                        </label>
                    </div>
                    <div class="text-sm">
                        <a href="#" onclick="lupaPassword()" class="font-medium text-emerald-600 hover:text-emerald-500">
                            Lupa password?
                        </a>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white transition-all role-transition transform hover:scale-[1.02]">
                    <i data-lucide="log-in" width="18"></i> Masuk Sistem
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-slate-400">
                <p>Pastikan Anda memilih peran yang sesuai di atas.</p>
                <p class="mt-2">&copy; 2026 MTS Tarbiyatus Syarifah</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
